<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 奋斗精神 · 30秒震撼视频</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background:#000; 
  width:100vw; height:100vh; 
  overflow:hidden; 
  font-family: -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;
  display:flex; align-items:center; justify-content:center;
}
#stage { width:100vw; height:100vh; position:relative; overflow:hidden; }
canvas { position:absolute; inset:0; z-index:1; }

/* Layers */
.layer { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none; }

/* Stars */
.star { position:absolute; background:#fff; border-radius:50%; }

/* Text styles */
.title-big {
  font-size: clamp(48px, 10vw, 120px);
  font-weight:900;
  color:#fff;
  text-shadow: 0 0 80px rgba(0,150,255,0.8), 0 0 200px rgba(0,100,255,0.4);
  letter-spacing: 8px;
  line-height: 1.1;
  text-align: center;
  opacity:0;
}
.title-gold {
  font-size: clamp(56px, 12vw, 140px);
  font-weight:900;
  background: linear-gradient(180deg, #ffdd00, #ff8c00, #ff4500);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 60px rgba(255,100,0,0.6));
  letter-spacing: 10px;
  line-height: 1.1;
  text-align: center;
  opacity:0;
}
.quote-text {
  font-size: clamp(14px, 3vw, 26px);
  color: rgba(255,255,255,0.85);
  text-align: center;
  line-height: 2;
  letter-spacing: 3px;
  opacity:0;
}
.musk-name {
  font-size: clamp(12px, 2.5vw, 18px);
  color: rgba(255,255,255,0.5);
  letter-spacing: 6px;
  text-align: center;
  opacity:0;
}
.final-big {
  font-size: clamp(40px, 8vw, 90px);
  font-weight:900;
  background: linear-gradient(180deg, #ff6600, #ff3300);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 80px rgba(255,80,0,0.8));
  letter-spacing: 12px;
  text-align: center;
  opacity:0;
}
.sub-text {
  font-size: clamp(16px, 3vw, 28px);
  color: rgba(255,255,255,0.7);
  letter-spacing: 10px;
  text-align: center;
  opacity:0;
}

/* Cards */
.cards-row {
  display: flex;
  gap: clamp(12px, 3vw, 30px);
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 20px;
}
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: clamp(16px, 3vw, 28px) clamp(12px, 2vw, 24px);
  text-align: center;
  width: clamp(140px, 22vw, 200px);
  opacity:0;
  backdrop-filter: blur(10px);
}
.card .icon { font-size: clamp(24px, 4vw, 40px); margin-bottom: 10px; }
.card .ctitle { font-size: clamp(12px, 1.8vw, 16px); color:#4da6ff; font-weight:700; letter-spacing:2px; }
.card .cdesc { font-size: clamp(10px, 1.4vw, 13px); color:rgba(255,255,255,0.5); margin-top:6px; line-height:1.6; }

/* Rocket */
.rocket-layer { position:absolute; bottom:0; left:0; right:0; height:50%; z-index:5; display:flex; align-items:flex-end; justify-content:center; pointer-events:none; }
.rocket-wrap { position:relative; text-align:center; transform:translateY(100%); }
.rocket-icon { font-size: clamp(40px, 8vw, 80px); display:block; }
.flame { 
  display:block; 
  width:4px; 
  height:80px; 
  background: linear-gradient(to top, rgba(255,100,0,0), rgba(255,150,0,0.8), rgba(255,220,50,1));
  margin: 0 auto;
  border-radius: 2px;
  filter: blur(2px);
}

/* Play btn */
.play-btn {
  position:fixed; bottom:30px; right:30px; z-index:999;
  width:60px; height:60px; border-radius:50%;
  background:rgba(0,150,255,0.8); color:#fff; border:none;
  font-size:24px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter: blur(10px);
  transition: all 0.3s;
}
.play-btn:hover { background:#0066ff; transform:scale(1.1); }
.progress-bar {
  position:fixed; bottom:0; left:0; height:3px; z-index:999;
  background: linear-gradient(90deg, #0066ff, #ff6600);
  transition: width 0.1s linear;
}
.timer {
  position:fixed; top:20px; right:20px; z-index:999;
  color:rgba(255,255,255,0.6); font-size:14px;
  background:rgba(0,0,0,0.5); padding:6px 14px; border-radius:20px;
}

/* Responsive */
@media(max-aspect-ratio: 9/16) {
  .cards-row { flex-direction:column; align-items:center; }
  .card { width:80vw; }
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bg"></canvas>
  <div class="rocket-layer"><div class="rocket-wrap" id="rocket">
    <span class="flame" id="flame"></span>
    <span class="rocket-icon">🚀</span>
  </div></div>
  
  <div class="layer">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="title-big" id="t1">没有退路</div>
      <div class="title-gold" id="t2">只有向前</div>
    </div>
  </div>
  
  <div class="layer">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;">
      <div class="quote-text" id="quote">" 当某事足够重要，<br>你就去做它，<br>即使胜算不大 "</div>
      <div class="musk-name" id="musk">—— ELON MUSK</div>
    </div>
  </div>
  
  <div class="layer">
    <div class="cards-row">
      <div class="card" id="card1"><div class="icon">⚡</div><div class="ctitle">第一性原理</div><div class="cdesc">从根本出发<br>重塑一切可能</div></div>
      <div class="card" id="card2"><div class="icon">🛡️</div><div class="ctitle">永不言弃</div><div class="cdesc">三次爆炸算什么<br>直到飞向火星</div></div>
      <div class="card" id="card3"><div class="icon">🌌</div><div class="ctitle">疯狂梦想</div><div class="cdesc">AI 不是为了替代<br>而是为了超越</div></div>
    </div>
  </div>
  
  <div class="layer">
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
      <div class="final-big" id="final">无问西东</div>
      <div class="sub-text" id="sub">AI AGENT · KEEP PUSHING FORWARD</div>
    </div>
  </div>
</div>

<button class="play-btn" id="playBtn" onclick="play()">▶</button>
<div class="progress-bar" id="progress"></div>
<div class="timer" id="timer">00:00 / 00:30</div>

<script>
// ============ AUDIO ENGINE (震撼背景音乐) ============
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function createImpact(time, freq=80, duration=0.8, vol=0.5) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, time);
  osc.frequency.exponentialRampToValueAtTime(20, time+duration);
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(time); osc.stop(time+duration);
}

function createBoom(time, vol=0.6) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 1.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0; i<bufferSize; i++) {
    data[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*0.3)) * vol;
  }
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(200, time);
  filter.frequency.exponentialRampToValueAtTime(30, time+1.5);
  src.buffer = buffer;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time+1.5);
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  src.start(time); src.stop(time+1.5);
}

function createBeat(time, vol=0.3) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(60, time);
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time+0.15);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(time); osc.stop(time+0.15);
}

function createRise(time, duration=2, fromFreq=40, toFreq=200, vol=0.25) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(fromFreq, time);
  osc.frequency.exponentialRampToValueAtTime(toFreq, time+duration);
  gain.gain.setValueAtTime(0.001, time);
  gain.gain.linearRampToValueAtTime(vol, time+0.3);
  gain.gain.linearRampToValueAtTime(0.001, time+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(time); osc.stop(time+duration);
}

function createPad(time, duration=4, freq=100, vol=0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, time);
  osc.frequency.setValueAtTime(freq*1.01, time+duration/2);
  gain.gain.setValueAtTime(0.001, time);
  gain.gain.linearRampToValueAtTime(vol, time+1);
  gain.gain.linearRampToValueAtTime(0.001, time+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(time); osc.stop(time+duration);
}

function scheduleMusic(t0) {
  // 0-3s: 渐入低音垫 + 心跳鼓点
  createPad(t0, 4, 80, 0.08);
  createPad(t0, 4, 40, 0.06);
  for (let i=0; i<3; i++) createBeat(t0+i*0.8, 0.2);

  // 3s: 第一次冲击 "只有向前"
  createBoom(t0+3, 0.5);
  createImpact(t0+3, 100, 1, 0.4);
  
  // 3-6s: 节奏加强
  createRise(t0+3, 3, 60, 160, 0.15);
  for (let i=0; i<4; i++) createBeat(t0+3.5+i*0.5, 0.25);
  
  // 6s: 火箭升空音效
  createRise(t0+6, 2, 80, 400, 0.2);
  createPad(t0+6, 3, 120, 0.08);
  
  // 8-11s: 卡片出现
  createBoom(t0+8, 0.3);
  createImpact(t0+8, 60, 0.5, 0.25);
  createBoom(t0+9.2, 0.3);
  createBoom(t0+10.4, 0.3);
  
  // 11-15s: 引用文字
  createPad(t0+11, 4, 60, 0.06);
  createPad(t0+11, 4, 50, 0.05);
  for (let i=0; i<4; i++) createBeat(t0+11.5+i*0.7, 0.15);
  
  // 15-19s: 情绪攀升
  createRise(t0+15, 4, 40, 250, 0.18);
  for (let i=0; i<6; i++) createBeat(t0+15.5+i*0.4, 0.22);
  
  // 19s: 大冲击
  createBoom(t0+19, 0.7);
  createImpact(t0+19, 60, 1.5, 0.5);
  
  // 22s: "无问西东" 
  createBoom(t0+22, 0.8);
  createImpact(t0+22, 50, 2, 0.6);
  createImpact(t0+22, 80, 1.5, 0.4);
  
  // 22-26s: 高潮
  createRise(t0+22, 4, 50, 300, 0.2);
  createPad(t0+22, 4, 100, 0.07);
  for (let i=0; i<8; i++) createBeat(t0+22.5+i*0.3, 0.28);
  
  // 26-30s: 尾声
  createBoom(t0+26, 0.5);
  createImpact(t0+26, 40, 2, 0.3);
  createPad(t0+27, 4, 80, 0.06);
  for (let i=0; i<3; i++) createBeat(t0+27.5+i*0.6, 0.18);
  
  // 30s: 结束冲击
  createBoom(t0+30, 0.9);
  createImpact(t0+30, 40, 3, 0.7);
}

// ============ VISUAL ENGINE ============
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
const stars = [];
const particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Generate stars
for (let i=0; i<200; i++) {
  stars.push({
    x: Math.random()*2000, y: Math.random()*2000,
    r: Math.random()*2+0.5,
    twinkle: Math.random()*Math.PI*2,
    speed: Math.random()*0.02+0.005
  });
}
// Nebula particles
for (let i=0; i<30; i++) {
  particles.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*80+40,
    alpha: Math.random()*0.08+0.02,
    color: ['#0066ff','#ff6600','#9933ff','#00aaff'][Math.floor(Math.random()*4)],
    dx: (Math.random()-0.5)*0.3, dy: (Math.random()-0.5)*0.3
  });
}

let shakeAmount = 0;
let flashAlpha = 0;

function drawBG() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);
  
  // Nebula
  for (let p of particles) {
    p.x += p.dx; p.y += p.dy;
    if (p.x<-100) p.x=W+100; if (p.x>W+100) p.x=-100;
    if (p.y<-100) p.y=H+100; if (p.y>H+100) p.y=-100;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.globalAlpha = p.alpha;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Stars
  for (let s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  
  // Flash overlay
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(255,200,100,${flashAlpha})`;
    ctx.fillRect(0,0,W,H);
    flashAlpha *= 0.92;
  }
  
  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, W*0.4, W/2, H/2, W*0.9);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0,0,W,H);
}

function flash(intensity=0.5) { flashAlpha = Math.max(flashAlpha, intensity); }
function shake(amount=10) { shakeAmount = Math.max(shakeAmount, amount); }

// Shake effect on stage
function applyShake() {
  if (shakeAmount > 0.1) {
    const sx = (Math.random()-0.5) * shakeAmount;
    const sy = (Math.random()-0.5) * shakeAmount;
    document.getElementById('stage').style.transform = `translate(${sx}px,${sy}px)`;
    shakeAmount *= 0.85;
  } else {
    document.getElementById('stage').style.transform = '';
    shakeAmount = 0;
  }
}

// ============ TIMELINE ============
const TOTAL_DURATION = 30; // seconds

function animate(t0, elapsed) {
  const stage = document.getElementById('stage');
  
  if (elapsed < 3) {
    // 0-3s: "没有退路" 淡入
    const p = elapsed / 3;
    document.getElementById('t1').style.opacity = easeOut(p);
    document.getElementById('t2').style.opacity = 0;
    document.getElementById('t1').style.transform = `scale(${0.8+0.2*easeOut(p)})`;
  }
  else if (elapsed < 6) {
    // 3-6s: "只有向前" 震撼出现
    document.getElementById('t1').style.opacity = 0;
    const p = (elapsed-3) / 3;
    document.getElementById('t2').style.opacity = easeOut(p);
    document.getElementById('t2').style.transform = `scale(${0.7+0.3*easeOut(p)})`;
    if (elapsed < 3.3) { flash(0.4); shake(15); }
  }
  else if (elapsed < 8) {
    // 6-8s: 火箭升空
    document.getElementById('t2').style.opacity = 0;
    const p = (elapsed-6) / 2;
    const rocket = document.getElementById('rocket');
    const flame = document.getElementById('flame');
    rocket.style.transform = `translateY(${100-easeOut(p)*100}%)`;
    flame.style.height = (80 + Math.sin(elapsed*20)*30) + 'px';
    flame.style.opacity = 1;
    if (elapsed < 6.2) { flash(0.5); shake(20); }
  }
  else if (elapsed < 11) {
    // 8-11s: 三个卡片依次出现
    document.getElementById('rocket').style.transform = 'translateY(0%)';
    document.getElementById('flame').style.opacity = 0;
    const p1 = Math.min(1, (elapsed-8)/0.6);
    const p2 = Math.min(1, (elapsed-9.2)/0.6);
    const p3 = Math.min(1, (elapsed-10.4)/0.6);
    document.getElementById('card1').style.opacity = easeOut(p1);
    document.getElementById('card2').style.opacity = easeOut(p2);
    document.getElementById('card3').style.opacity = easeOut(p3);
    document.getElementById('card1').style.transform = `translateY(${30-easeOut(p1)*30}px)`;
    document.getElementById('card2').style.transform = `translateY(${30-easeOut(p2)*30}px)`;
    document.getElementById('card3').style.transform = `translateY(${30-easeOut(p3)*30}px)`;
  }
  else if (elapsed < 15) {
    // 11-15s: 引用文字 + 马斯克
    ['card1','card2','card3'].forEach(id => {
      document.getElementById(id).style.opacity = 0;
    });
    const p = (elapsed-11) / 4;
    document.getElementById('quote').style.opacity = easeOut(Math.min(1,p*2));
    document.getElementById('musk').style.opacity = easeOut(Math.min(1,(p-0.2)*2));
    document.getElementById('quote').style.transform = `scale(${0.9+0.1*easeOut(Math.min(1,p*2))})`;
  }
  else if (elapsed < 19) {
    // 15-19s: 情绪攀升 - 粒子爆发
    document.getElementById('quote').style.opacity = 0;
    document.getElementById('musk').style.opacity = 0;
    if (elapsed > 17 && Math.random() < 0.3) {
      const x = Math.random()*W, y = H*0.3+Math.random()*H*0.4;
      const grad = ctx.createRadialGradient(x,y,0,x,y,30);
      grad.addColorStop(0, 'rgba(255,150,0,0.3)');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();
    }
    if (elapsed < 15.3) { flash(0.2); }
  }
  else if (elapsed < 22) {
    // 19-22s: 能量蓄力
    if (elapsed < 19.3) { flash(0.6); shake(25); }
    const p = (elapsed-19)/3;
    // pulsing glow
    const glowAlpha = 0.05 + 0.1 * Math.sin(elapsed*8);
    const glow = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);
    glow.addColorStop(0, `rgba(255,100,0,${glowAlpha})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,W,H);
  }
  else if (elapsed < 26) {
    // 22-26s: "无问西东" 大字震撼
    if (elapsed < 22.3) { flash(0.8); shake(30); }
    const p = (elapsed-22) / 4;
    document.getElementById('final').style.opacity = easeOut(p);
    document.getElementById('final').style.transform = `scale(${0.6+0.4*easeOut(p)})`;
    document.getElementById('sub').style.opacity = easeOut(Math.max(0,(p-0.3)/0.7));
  }
  else if (elapsed < 30) {
    // 26-30s: 落版 + 震撼尾声
    document.getElementById('final').style.opacity = 1;
    document.getElementById('sub').style.opacity = 1;
    if (elapsed < 26.3) { flash(0.5); shake(15); }
    
    // Rising flames at bottom
    const fp = (elapsed-26)/4;
    const flameGrad = ctx.createLinearGradient(0, H, 0, H*(1-fp*0.4));
    flameGrad.addColorStop(0, 'rgba(255,80,0,0.5)');
    flameGrad.addColorStop(0.3, 'rgba(255,150,0,0.3)');
    flameGrad.addColorStop(0.6, 'rgba(255,200,50,0.1)');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.fillRect(0, H*(1-fp*0.4), W, H*fp*0.4);
  }
  
  applyShake();
}

function easeOut(t) { return 1 - Math.pow(1-t, 3); }

// ============ PLAYBACK ============
let playing = false;
let startTime = 0;
let animFrame;
let audioScheduled = false;

function resetAll() {
  const ids = ['t1','t2','quote','musk','final','sub','card1','card2','card3'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.opacity = 0; el.style.transform = ''; }
  });
  document.getElementById('rocket').style.transform = 'translateY(100%)';
  document.getElementById('flame').style.opacity = 0;
  document.getElementById('flame').style.height = '80px';
  flashAlpha = 0;
  shakeAmount = 0;
  document.getElementById('stage').style.transform = '';
  audioScheduled = false;
}

function play() {
  if (playing) return;
  initAudio();
  resetAll();
  
  playing = true;
  startTime = performance.now()/1000;
  document.getElementById('playBtn').style.display = 'none';
  
  // Schedule audio
  if (audioCtx) {
    const t0 = audioCtx.currentTime + 0.1;
    scheduleMusic(t0);
    audioScheduled = true;
  }
  
  requestAnimationFrame(loop);
}

function loop() {
  const elapsed = (performance.now()/1000 - startTime);
  
  if (elapsed >= TOTAL_DURATION) {
    playing = false;
    document.getElementById('playBtn').style.display = 'flex';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('timer').textContent = '00:30 / 00:30';
    // Replay after 2s
    setTimeout(() => {
      document.getElementById('progress').style.width = '0%';
      document.getElementById('timer').textContent = '00:00 / 00:30';
    }, 1500);
    return;
  }
  
  // Progress
  const pct = (elapsed / TOTAL_DURATION) * 100;
  document.getElementById('progress').style.width = pct + '%';
  const s = Math.floor(elapsed);
  document.getElementById('timer').textContent = 
    String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+' / 00:30';
  
  drawBG();
  animate(startTime, elapsed);
  requestAnimationFrame(loop);
}

// Start background render
function bgLoop() {
  if (!playing) drawBG();
  requestAnimationFrame(bgLoop);
}
bgLoop();

// Keyboard shortcut
document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); play(); } });
</script>
</body>
</html>
