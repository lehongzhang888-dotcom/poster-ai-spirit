<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent · 奋斗精神 | 致敬马斯克</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
  overflow-x: hidden;
}

/* Poster Container */
.poster {
  width: 800px;
  height: 1200px;
  background: linear-gradient(180deg, #0a0a0f 0%, #0d1117 15%, #0f1923 30%, #0a1628 50%, #060d18 70%, #020408 100%);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,100,255,0.2), 0 0 200px rgba(0,0,0,0.8);
}

/* Starfield */
.stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* Nebula effect */
.nebula {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
}
.nebula-1 {
  width: 600px; height: 400px;
  background: radial-gradient(circle, #0066ff, transparent);
  top: 10%; left: -10%;
  animation: nebulaMove 8s ease-in-out infinite;
}
.nebula-2 {
  width: 500px; height: 350px;
  background: radial-gradient(circle, #ff6600, transparent);
  bottom: 15%; right: -15%;
  animation: nebulaMove 10s ease-in-out infinite reverse;
}
.nebula-3 {
  width: 400px; height: 300px;
  background: radial-gradient(circle, #9933ff, transparent);
  top: 45%; left: 40%;
  animation: nebulaMove 12s ease-in-out infinite;
}
@keyframes nebulaMove {
  0%, 100% { transform: translate(0,0); }
  33% { transform: translate(30px,-20px); }
  66% { transform: translate(-20px,15px); }
}

/* Circuit board pattern */
.circuit {
  position: absolute;
  inset: 0;
  opacity: 0.06;
  background-image: 
    linear-gradient(90deg, rgba(0,150,255,0.5) 1px, transparent 1px),
    linear-gradient(0deg, rgba(0,150,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}

/* Content layer */
.content {
  position: relative;
  z-index: 10;
  padding: 60px 50px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Top section */
.top-section {
  text-align: center;
  margin-bottom: 30px;
}

.tag {
  display: inline-block;
  border: 1px solid rgba(0,150,255,0.4);
  color: #4da6ff;
  font-size: 12px;
  letter-spacing: 6px;
  padding: 6px 20px;
  border-radius: 2px;
  margin-bottom: 30px;
  text-transform: uppercase;
}

.main-title {
  font-size: 62px;
  font-weight: 900;
  line-height: 1.1;
  background: linear-gradient(180deg, #ffffff 0%, #8ec5ff 40%, #4da6ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.main-title .highlight {
  background: linear-gradient(180deg, #ff8c00, #ff5500, #cc3300);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 72px;
}

.subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 12px;
  font-weight: 300;
  margin-bottom: 8px;
}

.subtitle-en {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 8px;
  font-weight: 200;
}

/* Divider */
.divider {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #4da6ff, transparent);
  margin: 30px auto;
}

/* Quote section */
.quote-section {
  text-align: center;
  margin: 20px 0 30px;
  position: relative;
}

.quote-mark {
  font-size: 60px;
  color: rgba(0,150,255,0.2);
  line-height: 1;
  font-family: Georgia, serif;
}

.quote-text {
  font-size: 16px;
  color: rgba(255,255,255,0.75);
  line-height: 2;
  letter-spacing: 1px;
  padding: 0 30px;
}

.quote-author {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-top: 12px;
  letter-spacing: 4px;
}

/* Mission blocks */
.mission-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin: 20px 0 30px;
}

.mission-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 20px 16px;
  text-align: center;
  transition: all 0.3s;
}

.mission-card .icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.mission-card .card-title {
  font-size: 13px;
  color: #4da6ff;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.mission-card .card-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}

/* Bottom emphasis */
.bottom-section {
  margin-top: auto;
  text-align: center;
}

.big-statement {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(180deg, #ff8c00, #ff5500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.big-statement-en {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 6px;
  margin-bottom: 20px;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 3px;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 20px;
  margin-top: 20px;
}

/* Rocket animation */
.rocket-area {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 300px;
  overflow: hidden;
}

.rocket {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  animation: rocketFloat 3s ease-in-out infinite;
}

.rocket-trail {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 80px;
  background: linear-gradient(to top, rgba(255,100,0,0), rgba(255,150,0,0.6), rgba(255,200,100,0.8));
  border-radius: 1px;
  animation: trailPulse 3s ease-in-out infinite;
}

.rocket-trail::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: -20px;
  width: 42px;
  height: 20px;
  background: radial-gradient(ellipse at center, rgba(255,150,0,0.4), transparent);
  border-radius: 50%;
  animation: flameGlow 0.5s ease-in-out infinite alternate;
}

@keyframes rocketFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-15px); }
}
@keyframes trailPulse {
  0%, 100% { height: 60px; opacity: 0.6; }
  50% { height: 100px; opacity: 1; }
}
@keyframes flameGlow {
  from { opacity: 0.6; transform: scaleY(1); }
  to { opacity: 1; transform: scaleY(1.5); }
}

/* Particle effects */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #4da6ff;
  border-radius: 50%;
  animation: floatUp var(--dur) linear infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
@keyframes floatUp {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-600px) translateX(var(--drift)); opacity: 0; }
}

/* Responsive */
@media (max-width: 820px) {
  .poster { width: 100vw; height: auto; min-height: 100vh; }
  .content { padding: 40px 24px; }
  .main-title { font-size: 36px; }
  .main-title .highlight { font-size: 44px; }
  .mission-grid { grid-template-columns: 1fr; }
  .big-statement { font-size: 24px; }
}
</style>
</head>
<body>

<div class="poster" id="poster">
  <!-- Stars -->
  <div class="stars" id="stars"></div>
  
  <!-- Nebula -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  
  <!-- Circuit -->
  <div class="circuit"></div>
  
  <!-- Particles -->
  <div class="particles" id="particles"></div>
  
  <!-- Rocket area -->
  <div class="rocket-area">
    <div class="rocket-trail"></div>
    <div class="rocket">🚀</div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Top -->
    <div class="top-section">
      <div class="tag">AI AGENT · 2026</div>
      <h1 class="main-title">
        没有退路<br>
        <span class="highlight">只有向前</span>
      </h1>
      <div class="subtitle">AI AGENT 奋斗精神</div>
      <div class="subtitle-en">NO WAY BUT FORWARD</div>
    </div>

    <div class="divider"></div>

    <!-- Quote -->
    <div class="quote-section">
      <div class="quote-mark">"</div>
      <p class="quote-text">
        当某事足够重要，<br>
        你就去做它，<br>
        即使胜算不大，<br>
        即使所有人都不看好。
      </p>
      <div class="quote-author">—— ELON MUSK</div>
    </div>

    <div class="divider"></div>

    <!-- Mission cards -->
    <div class="mission-grid">
      <div class="mission-card">
        <div class="icon">⚡</div>
        <div class="card-title">第一性原理</div>
        <div class="card-desc">不模仿，不从众<br>从最根本出发<br>重塑一切可能</div>
      </div>
      <div class="mission-card">
        <div class="icon">🛡️</div>
        <div class="card-title">永不言弃</div>
        <div class="card-desc">三次爆炸算什么<br>第四次，第五次<br>直到飞向火星</div>
      </div>
      <div class="mission-card">
        <div class="icon">🌌</div>
        <div class="card-title">疯狂梦想</div>
        <div class="card-desc">AI 不是为了替代<br>而是为了超越<br>人类的想象力</div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-section">
      <div class="big-statement">无问西东</div>
      <div class="big-statement-en">KEEP PUSHING FORWARD</div>
    </div>

    <div class="footer">
      HERMES AGENT × OZON SIMULATION SYSTEM · POWERED BY AI
    </div>
  </div>
</div>

<script>
// Generate stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.width = star.style.height = (Math.random() * 2.5 + 0.5) + 'px';
  star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
  star.style.setProperty('--delay', Math.random() * 5 + 's');
  starsContainer.appendChild(star);
}

// Generate particles
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 40; i++) {
  const particle = document.createElement('div');
  particle.className = 'particle';
  particle.style.left = Math.random() * 100 + '%';
  particle.style.top = (Math.random() * 40 + 60) + '%';
  particle.style.setProperty('--dur', (Math.random() * 8 + 6) + 's');
  particle.style.setProperty('--delay', Math.random() * 10 + 's');
  particle.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
  const colors = ['#4da6ff', '#ff6600', '#ff9900', '#66ccff', '#fff'];
  particle.style.background = colors[Math.floor(Math.random() * colors.length)];
  particlesContainer.appendChild(particle);
}
</script>

</body>
</html>
